version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg14
    container_name: solar-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-solar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-solar_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-solar_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-solar} -d ${POSTGRES_DB:-solar_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - solar-net

  redis:
    image: redis:7-alpine
    container_name: solar-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_2024}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - solar-net

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: solar-collector
    env_file:
      - .env
    environment:
      - COLLECTOR_INTERVAL=${COLLECTOR_INTERVAL:-10}
      - HISTORY_SYNC_INTERVAL=${HISTORY_SYNC_INTERVAL:-300}
      - BUFFER_MAX_SIZE=${BUFFER_MAX_SIZE:-10000}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - solar-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: solar-api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - solar-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  solar-net:
    driver: bridge